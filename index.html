<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Our Body</title>
    <link rel="stylesheet" href="Side.css" />
  </head>
  <body>
    <div class="content-container">
      <div id="page-sek" class="page-content">
        <h1>GAK TAHU</h1>
      </div>

      <div id="page-nanti" class="page-content">
        <h1>WORK BALANCE</h1>
      </div>

      <div id="page-utama" class="page-content active">
        <h1>HOME BASE</h1>
      </div>

      <div id="page-money" class="page-content">
        <h1>MONEY MANAGER</h1>
      </div>

      <div id="page-profile" class="page-content">
        <div class="profile-header">
          <div
            class="avatar-container"
            id="avatar-container"
            style="cursor: pointer"
          >
            <!-- Default Avatar gambar kosong/placeholder -->
            <img
              id="avatar-img"
              src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150"
              alt="Foto Profil"
              class="avatar"
            />

            <div class="edit-badge">✏️</div>
          </div>
        </div>
        <!-- Input file tersembunyi untuk memicu galeri HP -->
        <input
          type="file"
          id="avatar-input"
          accept="image/*"
          style="display: none"
        />

        <!-- Nama Profil -->
        <h2 class="profile-name">AKHMAD UBAIDILLAH ASFIYA</h2>

        <!-- Lencana My Points -->
        <div class="my-points-box">
          <span>MY POINTS</span>
        </div>
        
        <h3 class="section-title" data-lang="profile">Profil</h3>
        <!-- Daftar Menu Utama -->
        <div class="menu-list">
          <!-- Button Informasi Pribadi -->
          <div class="menu-item" style="cursor: pointer">
            <div class="menu-left" data-lang="personal_info">
              Informasi Pribadi
            </div>
            <div class="menu-right">➔</div>
          </div>

          <!-- Button Toko -->
          <div class="menu-item" style="cursor: pointer">
            <div class="menu-left" data-lang="store">Toko</div>
            <div class="menu-right">➔</div>
          </div>
          <!-- Button Akumulasi Progress -->
          <div class="menu-item" style="cursor: pointer">
            <div class="menu-left" data-lang="achievements">Pencapaian</div>
            <div class="menu-right">➔</div>
          </div>

          <!-- button widget -->
          <div class="menu-item" style="cursor: pointer">
            <div class="menu-left" data-lang="widgets">Widget</div>
            <div class="menu-right">➔</div>
          </div>
        </div>

        <!-- Bagian Sub-Judul: General -->
        <h3 class="section-title" data-lang="general">Umum</h3>

        <!-- Daftar Menu General -->
        <div class="menu-list">
          <!-- Button Bantuan -->
          <div class="menu-item" style="cursor: pointer">
            <div class="menu-left" data-lang="help">Bantuan</div>
            <div class="menu-right">➔</div>
          </div>

          <!-- Button Pengaturan -->
          <div
            id="btn-buka-pengaturan"
            class="menu-item"
            style="cursor: pointer"
          >
            <div class="menu-left" data-lang="settings">Pengaturan</div>
            <div class="menu-right">➔</div>
          </div>
          <!-- Button Legal -->
          <div class="menu-item" style="cursor: pointer">
            <div class="menu-left" data-lang="about">Tentang</div>
            <div class="menu-right">➔</div>
          </div>
        </div>
      </div>

      <!--halaman pengaturan -->
      <div
        id="halaman-pengaturan"
        class="page-content"
        style="padding: 0; background: transparent"
      >
        <div class="header-pengaturan-baru">
          <div id="btn-kembali-profil">&#x2190;</div>
        </div>
        <div class="layer-konten-pengaturan">
          <h3 class="section-title" data-lang="appearance">
            Tampilan & Bahasa
          </h3>

          <!-- dark mode -->
          <div class="menu-list">
            <div class="menu-item" style="cursor: pointer">
              <div class="menu-left" data-lang="display">Tampilan Sistem</div>
              <div class="menu-right">
                <label class="switch-warna">
                  <input type="checkbox" id="toggle-darkmode" />
                  <span class="slider-bulat"></span>
                </label>
              </div>
            </div>

            <!-- bahasa -->
            <div class="menu-item" style="cursor: pointer">
              <div class="menu-left" data-lang="language">Bahasa</div>
              <div class="menu-right">
                <select id="language-select">
                  <option value="id">Indonesia</option>
                  <option value="en">English</option>
                </select>
              </div>
            </div>
          </div>

          <h3 class="section-title" data-lang="accessibility">Aksesibilitas</h3>

          <!-- notifikasi -->
          <div class="menu-list">
            <div class="menu-item" style="cursor: pointer">
              <div class="menu-left" data-lang="notification">Notifikasi</div>
              <div class="menu-right">➔</div>
            </div>

            <!-- unit pengukuran -->
            <div class="menu-item" style="cursor: pointer">
              <div class="menu-left" data-lang="units">Pengukuran</div>
              <div class="menu-right">➔</div>
            </div>
          </div>
        </div>
      </div>
      <div id="tampilan" class="page-content">
        <div class="menu-item" style="cursor: pointer"></div>
      </div>
    </div>
    <div class="bottom">
      <a href="#" data-target="page-sek">1</a>
      <a href="#" data-target="page-nanti">2</a>
      <a href="#" data-target="page-utama">3</a>
      <a href="#" data-target="page-money">4</a>
      <a href="#" data-target="page-profile">5</a>
    </div>
    <script src="script.js"></script>
  </body>
</html>
